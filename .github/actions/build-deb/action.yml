name: "Build .deb Package"
description: |
  Builds Debian packages for an image's local scripts using nfpm.

  Prerequisites:
    - Staged artifacts must exist (run scripts/<image>/package-release.sh first)
    - images/<image>/nfpm.yaml must exist

  Produces artifacts at:
    artifacts/release/<name>_<version>_<arch>.deb

  Callers are responsible for uploading artifacts if needed.

  See scripts/package-deb.sh for implementation details.

inputs:
  image:
    description: "Image whose local tools to package (e.g. ci-tools)"
    required: true
  version:
    description: "Package version (e.g. 1.0.0)"
    required: true

runs:
  using: "composite"
  steps:
    - name: Validate version
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
      run: ./scripts/validate-version.sh "${VERSION}" > /dev/null

    - name: Setup Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: stable
        cache: false

    - name: Install nfpm
      shell: bash
      run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

    - name: Build deb packages
      shell: bash
      env:
        IMAGE: ${{ inputs.image }}
        VERSION: ${{ inputs.version }}
      run: ./scripts/package-deb.sh "${IMAGE}" "${VERSION}"
