name: Publish Images

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  matrix:
    name: Compute build matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      images: ${{ steps.compute.outputs.images }}
      distributable: ${{ steps.compute.outputs.distributable }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate release tag
        # Strict vN.N.N only. The tag is the release version; the release PR
        # stamped each changed image's images/<name>/version to it.
        run: ./scripts/validate-version-strict.sh "${{ github.ref_name }}"

      - name: Compute build matrix
        id: compute
        # Builds only images stamped to this release (version == the tag).
        run: ./scripts/compute-build-matrix.sh "${{ github.ref_name }}"

  publish:
    name: Publish ${{ matrix.image }}
    needs: matrix
    if: ${{ needs.matrix.outputs.images != '[]' }}
    runs-on: ubuntu-latest
    concurrency:
      group: publish-${{ matrix.image }}
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write # cosign keyless signing (Fulcio OIDC)
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJSON(needs.matrix.outputs.images) }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Load build args
        id: args
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          {
            echo "build_args<<LOCKFILE_EOF"
            sed "s/=local$/=${VERSION}/" "images/${{ matrix.image }}/versions.lock"
            echo "IMAGE_VERSION=${TAG}"
            echo "LOCKFILE_EOF"
            # Extract description from the Dockerfile label so annotations stay in sync
            echo "image-description=$(
              sed -n 's/.*image\.description="\(.*\)"/\1/p' \
                "images/${{ matrix.image }}/Dockerfile"
            )"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build and verify
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: images/${{ matrix.image }}/
          load: true
          tags: ${{ matrix.image }}:verify
          build-args: ${{ steps.args.outputs.build_args }}
          cache-from: type=registry,ref=ghcr.io/knight-owl-dev/${{ matrix.image }}:latest

      - name: Verify tools
        run: make verify IMAGE=${{ matrix.image }} IMAGE_TAG=${{ matrix.image }}:verify

      - name: Scan for vulnerabilities
        # Scans the single-platform :verify image (amd64 on GitHub-hosted runners).
        # arm64 is not scanned separately — CVEs are tracked by source package, so
        # the amd64 scan covers the same package set for both architectures.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          image-ref: ${{ matrix.image }}:verify
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true # skip upstream CVEs with no available patch
          trivyignores: images/${{ matrix.image }}/.trivyignore
          format: 'table'

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Build and push
        id: push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: images/${{ matrix.image }}/
          platforms: linux/amd64,linux/arm64
          build-args: ${{ steps.args.outputs.build_args }}
          tags: |
            ghcr.io/knight-owl-dev/${{ matrix.image }}:latest
            ghcr.io/knight-owl-dev/${{ matrix.image }}:${{ github.ref_name }}
          push: true
          sbom: true
          provenance: true
          annotations: |
            index:org.opencontainers.image.description=${{ steps.args.outputs.image-description }}
            index:org.opencontainers.image.source=https://github.com/knight-owl-dev/devops
            index:org.opencontainers.image.licenses=MIT
          cache-from: type=registry,ref=ghcr.io/knight-owl-dev/${{ matrix.image }}:latest
          # Inline cache: the Dockerfile is single-stage so every layer is cached.
          # Release cadence is low enough that a dedicated registry cache ref would
          # add management overhead with no meaningful build-time savings.
          cache-to: type=inline

      - name: Sign image
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        # Signs the manifest index — one signature covers both platforms and tags
        run: cosign sign --yes "ghcr.io/knight-owl-dev/${{ matrix.image }}@${DIGEST}"

  package:
    name: Package ${{ matrix.image }}
    needs: [matrix, publish]
    if: ${{ needs.matrix.outputs.distributable != '[]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJSON(needs.matrix.outputs.distributable) }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Extract release version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "${GITHUB_OUTPUT}"

      - name: Build release archives
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: ./scripts/${{ matrix.image }}/package-release.sh "${VERSION}"

      - name: Build deb packages
        uses: ./.github/actions/build-deb
        with:
          image: ${{ matrix.image }}
          version: ${{ steps.version.outputs.version }}

      - name: Upload package artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: packages-${{ matrix.image }}
          path: |
            artifacts/release/*.tar.gz
            artifacts/release/*.deb
          if-no-files-found: error

  release:
    name: Create Release
    needs: [matrix, publish, package]
    # Always cut a Release for the pushed tag (the changelog anchor). Run even
    # when publish/package are skipped, but not when a build that did run failed.
    if: >-
      !cancelled()
      && needs.matrix.result == 'success'
      && needs.publish.result != 'failure'
      && needs.package.result != 'failure'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Determine packaging set
        id: pkg
        env:
          DISTRIBUTABLE: ${{ needs.matrix.outputs.distributable }}
        run: |
          if [[ "${DISTRIBUTABLE}" != "[]" ]]; then
            echo "has_assets=true" >> "${GITHUB_OUTPUT}"
          else
            echo "has_assets=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Download package artifacts
        if: steps.pkg.outputs.has_assets == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: packages-*
          merge-multiple: true # all images' assets land in one directory
          path: artifacts/release

      - name: Generate checksums
        if: steps.pkg.outputs.has_assets == 'true'
        # One combined checksums.txt + release-body.md over every image's assets.
        run: ./scripts/generate-checksums.sh

      - name: Create GitHub release (with assets)
        if: steps.pkg.outputs.has_assets == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        # --notes-file prepends the SHA256 checksums (from generate-checksums.sh)
        # to the auto-generated changelog (from --generate-notes + .github/release.yml).
        run: |
          gh release create "${TAG}" \
            --generate-notes \
            --notes-file artifacts/release/release-body.md \
            artifacts/release/*.tar.gz \
            artifacts/release/*.deb \
            artifacts/release/checksums.txt

      - name: Create GitHub release (changelog only)
        if: steps.pkg.outputs.has_assets != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        # No distributable image changed — publish a changelog-only Release so the
        # tag still anchors a release entry, with no package assets.
        run: gh release create "${TAG}" --generate-notes

  dispatch:
    name: Dispatch ${{ matrix.image }} downstream
    needs: [matrix, release]
    if: ${{ needs.matrix.outputs.distributable != '[]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJSON(needs.matrix.outputs.distributable) }}
    steps:
      - name: Extract release version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "${GITHUB_OUTPUT}"

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: knight-owl-dev
          repositories: |
            apt
            homebrew-tap

      - name: Trigger apt repository update
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          IMAGE: ${{ matrix.image }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh api repos/knight-owl-dev/apt/dispatches \
            -f event_type=release-published \
            -f 'client_payload[versions]='"${IMAGE}:${VERSION}"

      - name: Trigger Homebrew tap update
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          IMAGE: ${{ matrix.image }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh api repos/knight-owl-dev/homebrew-tap/dispatches \
            -f event_type=release-published \
            -f 'client_payload[formulas]='"${IMAGE}:${VERSION}"
