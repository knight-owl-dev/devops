name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    container: ghcr.io/knight-owl-dev/ci-tools:latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Lint
        run: make lint

  # Builds run on ubuntu-latest (x86_64) for both architectures. The tools
  # are bash scripts, so nfpm produces valid debs regardless of host arch.
  # Architecture-specific testing happens in test-deb using native runners.
  build-deb:
    name: Build .deb (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Version is a placeholder — CI exercises the packaging pipeline,
      # not a real release. The publish workflow uses the git tag.
      - name: Stage release artifacts
        run: ./scripts/package-release.sh 0.0.0

      - name: Build .deb package
        uses: ./.github/actions/build-deb
        with:
          version: 0.0.0

      - name: Upload .deb artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: deb-${{ matrix.arch }}
          path: artifacts/release/ci-tools_*_${{ matrix.arch }}.deb
          if-no-files-found: error

  test-deb:
    name: Test .deb (${{ matrix.distro }}-${{ matrix.arch }})
    needs: build-deb
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.image }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
            distro: debian
            image: debian:bookworm
          - runner: ubuntu-latest
            arch: amd64
            distro: ubuntu
            image: ubuntu:24.04
          - runner: ubuntu-24.04-arm
            arch: arm64
            distro: debian
            image: debian:bookworm
          - runner: ubuntu-24.04-arm
            arch: arm64
            distro: ubuntu
            image: ubuntu:24.04

    steps:
      - name: Checkout (for verify script)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: scripts
          sparse-checkout-cone-mode: false

      - name: Download .deb artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: deb-${{ matrix.arch }}
          path: deb

      - name: Verify installation
        run: ./scripts/verify-deb-install.sh ./deb/ci-tools_*_${{ matrix.arch }}.deb
